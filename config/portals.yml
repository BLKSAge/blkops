# ============================================================
# SCAN SETTINGS
# ============================================================
settings:
  target_roles:
    - "AI Consultant"
    - "Business Analyst"
    - "Senior Business Analyst"
    - "IT Project Manager"
    - "Technical Project Manager"
    - "AI Governance Consultant"
    - "Data Analyst"
    - "Strategy Consultant"
  keywords:
    required: ["Atlanta OR Austin OR remote"]
    preferred: ["AI", "consultant", "analyst", "project manager", "governance", "DoD", "federal"]
    exclude: ["junior", "intern", "entry level", "associate consultant"]
  min_score: 6
  daily_scan_tiers: [1, 2]
  weekly_scan_tiers: [3, 4]
